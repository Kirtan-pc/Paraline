<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <!-- Background of preview card -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0F0A"/>
      <stop offset="100%" stop-color="#0A0602"/>
    </linearGradient>
    <radialGradient id="wallpaper" cx="35%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#180C03" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080401" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="cornerBL" cx="0%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#DC2B0A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A0602" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerBR" cx="100%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#DC2B0A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A0602" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CC3A08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E8520F" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC3A08" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#CC3A08" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#CC3A08" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#CC3A08" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen">
      <rect x="34" y="34" width="572" height="292" rx="22"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="640" height="360" rx="32" fill="url(#bg)"/>

  <!-- Outer Window boundary -->
  <rect x="34" y="34" width="572" height="292" rx="22" fill="#040508" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <g clip-path="url(#screen)">
    <rect x="34" y="34" width="572" height="292" fill="url(#wallpaper)"/>

    <!-- Edge glow fills -->
    <rect x="34" y="220" width="572" height="106" fill="url(#bottomGlow)"/>
    <rect x="34" y="34" width="90" height="292" fill="url(#leftGlow)"/>
    <rect x="516" y="34" width="90" height="292" fill="url(#rightGlow)"/>

    <!-- Corner blooms -->
    <rect x="34" y="34" width="572" height="292" fill="url(#cornerBL)">
      <animate attributeName="opacity" values="1;0.7;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="34" y="34" width="572" height="292" fill="url(#cornerBR)">
      <animate attributeName="opacity" values="1;0.65;1" dur="4.3s" repeatCount="indefinite"/>
    </rect>

    <!-- Ember particles, drifting upward -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="9s" repeatCount="indefinite"/>
      <circle cx="60" cy="290" r="2.2" fill="#FF6010" opacity="0.9" filter="url(#glow)">
        <animate attributeName="cy" values="290;180;290" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0" dur="10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="105" cy="300" r="1.5" fill="#FF8020" opacity="0.7">
