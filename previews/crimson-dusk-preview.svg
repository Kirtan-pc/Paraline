  <defs>
    <radialGradient id="cornerBL" cx="0%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#DC2B0A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A0602" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerBR" cx="100%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#DC2B0A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A0602" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerTL" cx="0%" cy="0%" r="30%">
      <stop offset="0%" stop-color="#B84010" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0602" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerTR" cx="100%" cy="0%" r="30%">
      <stop offset="0%" stop-color="#B84010" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0602" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CC3A08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E8520F" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC3A08" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#CC3A08" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#CC3A08" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#CC3A08" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B84010" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#B84010" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen">
      <rect width="260" height="180" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
