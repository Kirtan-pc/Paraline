<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(168,210,255,0.26)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(168,210,255,0.26)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="leftCrystals" fill="none" stroke-linecap="round" filter="url(#glow)">
      <line x1="6" y1="72" x2="28" y2="70" stroke="#94d5ff" stroke-width="3.2" opacity="0.94">
        <animate attributeName="x2" values="24;34;26;32;24" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="y1" values="72;70;74;71;72" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="70;67;72;68;70" dur="2.2s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="96" x2="20" y2="98" stroke="#6f83ff" stroke-width="2.3" opacity="0.62">
        <animate attributeName="x2" values="16;22;18;24;16" dur="2.6s" begin="-0.4s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="128" x2="34" y2="126" stroke="#d7e9ff" stroke-width="2.7" opacity="0.84">
        <animate attributeName="x2" values="28;40;32;38;28" dur="1.9s" begin="-0.8s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="126;122;128;124;126" dur="1.9s" begin="-0.8s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="156" x2="24" y2="160" stroke="#b88eff" stroke-width="2.4" opacity="0.66">
        <animate attributeName="x2" values="20;28;22;30;20" dur="2.8s" begin="-1.1s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="182" x2="42" y2="180" stroke="#a8c7ff" stroke-width="3.4" opacity="0.98">
        <animate attributeName="x2" values="28;46;34;50;28" dur="1.7s" begin="-0.2s" repeatCount="indefinite"/>
        <animate attributeName="y1" values="182;180;184;179;182" dur="1.7s" begin="-0.2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="180;176;182;177;180" dur="1.7s" begin="-0.2s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="210" x2="26" y2="214" stroke="#6bb8ff" stroke-width="2.5" opacity="0.7">
        <animate attributeName="x2" values="18;30;22;32;18" dur="2.5s" begin="-1.3s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="238" x2="36" y2="236" stroke="#d7e9ff" stroke-width="2.9" opacity="0.84">
        <animate attributeName="x2" values="26;42;30;40;26" dur="2.1s" begin="-0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="268" x2="22" y2="270" stroke="#8fa8ff" stroke-width="2.2" opacity="0.58">
        <animate attributeName="x2" values="16;24;18;26;16" dur="2.7s" begin="-1.5s" repeatCount="indefinite"/>
      </line>
    </g>
  </defs>

  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="572" height="292" rx="26" fill="#07111a" stroke="rgba(255,255,255,0.06)"/>
  <rect x="34" y="34" width="64" height="292" fill="url(#leftGlow)"/>
  <rect x="542" y="34" width="64" height="292" fill="url(#rightGlow)"/>

  <g transform="translate(34 0)">
    <use href="#leftCrystals"/>
  </g>
  <g transform="translate(606 0) scale(-1 1)">
    <use href="#leftCrystals"/>
  </g>
</svg>
